<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird - Game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Fredoka:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section id="game">
        <img src="./assets/birdPng.png" alt="Bird Gif" id="bird">

        <div class="modalOverlay" id="startModal">
            <div class="modalBox">
                <h1 class="gameTitle">Flappy Bird</h1>
                <p class="modalSubtext">Tap <kbd>Space</kbd> / <kbd>W</kbd> / <kbd>↑</kbd> to fly!</p>
                <button class="gameBtn" id="startBtn">▶ Start Game</button>
            </div>
        </div>

        <div class="modalOverlay hidden" id="gameOverModal">
            <div class="modalBox">
                <h1 class="gameTitle gameOverTitle">Game Over!</h1>
                <p class="modalSubtext">Score: <span id="finalScore">0</span></p>
                <button class="gameBtn" id="restartBtn">↻ Restart</button>
            </div>
        </div>

        <div class="scoreBox">
            <span class="scoreLabel">SCORE</span>
            <span class="scoreValue" id="scoreValue">0</span>
        </div>
    </section>

    <script src="./game.js"></script>
</body>
</html>
